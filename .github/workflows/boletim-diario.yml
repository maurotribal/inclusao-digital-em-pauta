name: Boletim Diário de Inclusão Digital

on:
  schedule:
    # 12:00 UTC = 09:00 em Brasília (horário padrão)
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Gerar boletim do dia
        run: node scripts/gerar-boletim.js

      - name: Publicar (commit e push)
        run: |
          git config user.name "boletim-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nada novo para publicar hoje."
          else
            git commit -m "Boletim de $(date -u +%d/%m/%Y)"
            git pull --rebase origin main
            git push
          fi
